# Configuración específica para TESTS

# Desactivar ejecución de data.sql en tests
spring.sql.init.mode=never

# Usar base de datos en memoria H2 para tests (opcional, más rápido)
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver

# O seguir usando PostgreSQL (actual)
spring.datasource.url=jdbc:postgresql://localhost:5432/meditrack_db
spring.datasource.username=postgres
spring.datasource.password=admin123

# Hibernate: Crear/actualizar esquema pero sin datos iniciales
spring.jpa.hibernate.ddl-auto=create-drop

# Logs
logging.level.org.springframework.test=INFO