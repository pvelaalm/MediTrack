<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Mis Tareas')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar('ENFERMERIA')}"></nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar py-3">
            <div class="position-sticky">
                <ul class="nav flex-column px-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/enfermeria/dashboard}">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" th:href="@{/enfermeria/mis-tareas}">
                            <i class="bi bi-list-check me-2"></i>Mis Tareas
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Contenido principal -->
        <main class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    <i class="bi bi-list-check text-primary me-2"></i>Mis Tareas
                </h2>
                <span class="badge bg-secondary fs-6 px-3 py-2">
                    Total: <span th:text="${#lists.size(tareas)}">0</span> tareas
                </span>
            </div>

            <div th:if="${#lists.isEmpty(tareas)}" class="card shadow-sm">
                <div class="card-body text-center py-5 text-muted">
                    <i class="bi bi-inbox" style="font-size: 4rem;"></i>
                    <h5 class="mt-3">No tienes tareas asignadas</h5>
                    <p>Cuando se te asignen tareas, aparecerán aquí.</p>
                </div>
            </div>

            <div th:each="tarea : ${tareas}" class="card shadow-sm mb-3">
                <div class="card-body">
                    <div class="row align-items-start">
                        <!-- Info tarea -->
                        <div class="col-md-8">
                            <div class="d-flex align-items-start gap-2 mb-2">
                                <span class="badge"
                                      th:classappend="'badge-' + ${tarea.prioridad}"
                                      th:text="${tarea.prioridad}">Prioridad</span>
                                <span class="badge"
                                      th:classappend="'badge-' + ${tarea.estado}"
                                      th:text="${tarea.estado}">Estado</span>
                                <span class="badge bg-light text-dark border" th:text="${tarea.tipo}">Tipo</span>
                            </div>
                            <p class="fw-semibold mb-1" th:text="${tarea.descripcion}">Descripción</p>
                            <p class="text-muted mb-1 small">
                                <i class="bi bi-person me-1"></i>
                                <strong th:text="${tarea.paciente.nombre + ' ' + tarea.paciente.apellidos}">Paciente</strong>
                                &nbsp;·&nbsp;
                                <i class="bi bi-hospital me-1"></i>Hab. <span th:text="${tarea.paciente.habitacion}">N/A</span>
                                &nbsp;·&nbsp;
                                <i class="bi bi-clock me-1"></i><span th:text="${#temporals.format(tarea.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                            </p>
                            <p class="text-muted mb-0 small" th:if="${tarea.observaciones != null and !#strings.isEmpty(tarea.observaciones)}">
                                <i class="bi bi-chat-text me-1"></i><em th:text="${tarea.observaciones}">Obs</em>
                            </p>
                        </div>

                        <!-- Formulario actualizar estado -->
                        <div class="col-md-4">
                            <form th:action="@{/enfermeria/tareas/{id}/actualizar-estado(id=${tarea.id})}" method="post">
                                <label class="form-label small fw-semibold">Actualizar Estado:</label>
                                <select name="nuevoEstado" class="form-select form-select-sm mb-2">
                                    <option th:each="estado : ${estados}"
                                            th:value="${estado}"
                                            th:text="${estado}"
                                            th:selected="${estado == tarea.estado}">Estado</option>
                                </select>
                                <textarea name="observaciones" class="form-control form-control-sm mb-2"
                                          rows="2" placeholder="Observaciones (opcional)"
                                          th:text="${tarea.observaciones}"></textarea>
                                <button type="submit" class="btn btn-primary btn-sm w-100">
                                    <i class="bi bi-check2 me-1"></i>Actualizar
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
