<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- Fragment: head (importar en <head> de cada página) -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - MediTrack'">MediTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .navbar-brand { font-weight: 700; font-size: 1.4rem; }
        .sidebar { min-height: calc(100vh - 56px); background: #f8f9fa; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #495057; border-radius: 8px; margin-bottom: 4px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9ecef; color: #0d6efd; }
        .sidebar .nav-link i { width: 20px; }
        .content-area { padding: 2rem; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .badge-PENDIENTE { background-color: #ffc107 !important; color: #000; }
        .badge-EN_CURSO { background-color: #0d6efd !important; }
        .badge-REALIZADA { background-color: #198754 !important; }
        .badge-CANCELADA { background-color: #6c757d !important; }
        .badge-URGENTE { background-color: #dc3545 !important; }
        .badge-ALTA { background-color: #fd7e14 !important; }
        .badge-MEDIA { background-color: #6c757d !important; }
        .badge-BAJA { background-color: #adb5bd !important; color: #000; }
    </style>
</th:block>

<!-- Fragment: navbar -->
<nav th:fragment="navbar(rol)" class="navbar navbar-expand-lg navbar-dark"
     th:classappend="${rol == 'ENFERMERIA'} ? 'bg-primary' : (${rol == 'MEDICINA'} ? 'bg-success' : 'bg-purple')"
     style="background-color: #6f42c1 !important;"
     th:style="${rol == 'ENFERMERIA'} ? 'background: #0d6efd !important;' : (${rol == 'MEDICINA'} ? 'background: #198754 !important;' : 'background: #6f42c1 !important;')">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-hospital me-2"></i>MediTrack
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <!-- Menú ENFERMERIA -->
                <li class="nav-item" sec:authorize="hasRole('ENFERMERIA')">
                    <a class="nav-link" th:href="@{/enfermeria/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ENFERMERIA')">
                    <a class="nav-link" th:href="@{/enfermeria/mis-tareas}">
                        <i class="bi bi-list-check me-1"></i>Mis Tareas
                    </a>
                </li>

                <!-- Menú MEDICINA -->
                <li class="nav-item" sec:authorize="hasRole('MEDICINA')">
                    <a class="nav-link" th:href="@{/medicina/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MEDICINA')">
                    <a class="nav-link" th:href="@{/medicina/crear-tarea}">
                        <i class="bi bi-plus-circle me-1"></i>Nueva Tarea
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MEDICINA')">
                    <a class="nav-link" th:href="@{/medicina/pacientes}">
                        <i class="bi bi-people me-1"></i>Pacientes
                    </a>
                </li>

                <!-- Menú SUPERVISOR -->
                <li class="nav-item" sec:authorize="hasRole('SUPERVISOR')">
                    <a class="nav-link" th:href="@{/supervisor/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SUPERVISOR')">
                    <a class="nav-link" th:href="@{/supervisor/carga-trabajo}">
                        <i class="bi bi-bar-chart me-1"></i>Carga de Trabajo
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SUPERVISOR')">
                    <a class="nav-link" th:href="@{/supervisor/reasignar-tareas}">
                        <i class="bi bi-arrow-left-right me-1"></i>Reasignar Tareas
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('SUPERVISOR')">
                    <a class="nav-link" th:href="@{/supervisor/usuarios}">
                        <i class="bi bi-people-fill me-1"></i>Usuarios
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav align-items-center">
                <li class="nav-item me-2">
                    <span class="navbar-text text-white-50">
                        <i class="bi bi-person-circle me-1"></i>
                        <sec:authentication property="name"/>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right me-1"></i>Salir
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

</html>
