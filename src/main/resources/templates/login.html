<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d3b6e 0%, #1565c0 50%, #0d6efd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .login-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .credentials-info {
            background: #f8f9fa;
            border-left: 4px solid #0d6efd;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="login-header">
                    <div class="login-icon"><i class="bi bi-hospital"></i></div>
                    <h3 class="mb-0 fw-bold">MediTrack</h3>
                    <p class="mb-0 opacity-75">Sistema de Gestión Clínica</p>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span>Usuario o contraseña incorrectos.</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span>Sesión cerrada correctamente.</span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>Usuario
                            </label>
                            <input type="text" id="username" name="username"
                                   class="form-control form-control-lg"
                                   placeholder="Introduce tu usuario"
                                   autofocus required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Contraseña
                            </label>
                            <input type="password" id="password" name="password"
                                   class="form-control form-control-lg"
                                   placeholder="Introduce tu contraseña"
                                   required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                        </button>
                    </form>

                    <hr class="my-4">
                    <div class="credentials-info p-3">
                        <p class="mb-2 fw-semibold text-muted"><i class="bi bi-info-circle me-1"></i>Usuarios de prueba:</p>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="badge bg-primary">ENFERMERÍA</span>
                            <code>enfermera / enfermera123</code>
                        </div>
                        <div class="d-flex justify-content-between mb-1">
                            <span class="badge bg-success">MEDICINA</span>
                            <code>medico / medico123</code>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="badge bg-purple" style="background-color:#6f42c1!important">SUPERVISOR</span>
                            <code>supervisor / supervisor123</code>
                        </div>
                    </div>
                </div>
            </div>
            <p class="text-center text-white mt-3 opacity-75 small">
                &copy; 2026 MediTrack - TFG Sistema Hospitalario
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
