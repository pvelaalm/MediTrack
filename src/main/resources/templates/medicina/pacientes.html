<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Pacientes')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar('MEDICINA')}"></nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar py-3">
            <div class="position-sticky">
                <ul class="nav flex-column px-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/medicina/dashboard}">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/medicina/crear-tarea}">
                            <i class="bi bi-plus-circle me-2"></i>Nueva Tarea
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" th:href="@{/medicina/pacientes}">
                            <i class="bi bi-people me-2"></i>Pacientes
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Contenido principal -->
        <main class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    <i class="bi bi-people text-success me-2"></i>Lista de Pacientes
                </h2>
                <a th:href="@{/medicina/crear-paciente}" class="btn btn-success">
                    <i class="bi bi-person-plus me-1"></i>Nuevo Paciente
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(pacientes)}" class="text-center py-5 text-muted">
                        <i class="bi bi-people" style="font-size: 3rem;"></i>
                        <h5 class="mt-3">No hay pacientes registrados</h5>
                        <a th:href="@{/medicina/crear-paciente}" class="btn btn-success mt-2">
                            <i class="bi bi-person-plus me-1"></i>Registrar primer paciente
                        </a>
                    </div>
                    <div th:unless="${#lists.isEmpty(pacientes)}" class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Nombre Completo</th>
                                    <th>Fecha Nacimiento</th>
                                    <th>N.º Historia Clínica</th>
                                    <th>Habitación</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="paciente, iter : ${pacientes}">
                                    <td class="align-middle text-muted" th:text="${iter.count}">1</td>
                                    <td class="align-middle">
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="bg-info bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                                                 style="width:36px;height:36px;">
                                                <i class="bi bi-person text-info"></i>
                                            </div>
                                            <div>
                                                <strong th:text="${paciente.nombre + ' ' + paciente.apellidos}">Nombre</strong>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="align-middle">
                                        <span th:if="${paciente.fechaNacimiento != null}"
                                              th:text="${#temporals.format(paciente.fechaNacimiento, 'dd/MM/yyyy')}">Fecha</span>
                                        <span th:unless="${paciente.fechaNacimiento != null}" class="text-muted">N/A</span>
                                    </td>
                                    <td class="align-middle">
                                        <code th:text="${paciente.numeroHistoriaClinica}">HC</code>
                                    </td>
                                    <td class="align-middle">
                                        <span th:if="${paciente.habitacion != null and !#strings.isEmpty(paciente.habitacion)}"
                                              class="badge bg-light text-dark border"
                                              th:text="'Hab. ' + ${paciente.habitacion}">Hab</span>
                                        <span th:unless="${paciente.habitacion != null and !#strings.isEmpty(paciente.habitacion)}"
                                              class="text-muted small">Sin asignar</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white text-muted small py-2" th:unless="${#lists.isEmpty(pacientes)}">
                    Total: <strong th:text="${#lists.size(pacientes)}">0</strong> pacientes registrados
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
