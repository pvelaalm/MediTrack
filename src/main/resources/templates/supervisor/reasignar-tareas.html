<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Reasignar Tareas')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar('SUPERVISOR')}"></nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar py-3">
            <div class="position-sticky">
                <ul class="nav flex-column px-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/supervisor/dashboard}">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/supervisor/carga-trabajo}">
                            <i class="bi bi-bar-chart me-2"></i>Carga de Trabajo
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" th:href="@{/supervisor/reasignar-tareas}">
                            <i class="bi bi-arrow-left-right me-2"></i>Reasignar Tareas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/supervisor/usuarios}">
                            <i class="bi bi-people-fill me-2"></i>Usuarios
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Contenido principal -->
        <main class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    <i class="bi bi-arrow-left-right me-2" style="color: #6f42c1;"></i>Reasignar Tareas
                </h2>
                <span class="badge bg-secondary fs-6 px-3 py-2">
                    Total: <span th:text="${#lists.size(tareas)}">0</span> tareas
                </span>
            </div>

            <div th:if="${#lists.isEmpty(tareas)}" class="card shadow-sm">
                <div class="card-body text-center py-5 text-muted">
                    <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                    <h5 class="mt-3">No hay tareas en el sistema</h5>
                </div>
            </div>

            <div th:unless="${#lists.isEmpty(tareas)}" class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Descripción</th>
                                    <th>Paciente</th>
                                    <th>Turno</th>
                                    <th>Estado</th>
                                    <th>Prioridad</th>
                                    <th>Asignado actualmente a</th>
                                    <th style="min-width: 220px;">Reasignar a</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tarea : ${tareas}">
                                    <td class="align-middle">
                                        <span th:text="${#strings.abbreviate(tarea.descripcion, 40)}">Desc</span>
                                    </td>
                                    <td class="align-middle">
                                        <small th:text="${tarea.paciente.nombre + ' ' + tarea.paciente.apellidos}">Paciente</small>
                                    </td>
                                    <td class="align-middle">
                                        <small class="text-muted" th:text="${tarea.turno.nombre}">Turno</small>
                                    </td>
                                    <td class="align-middle">
                                        <span class="badge" th:classappend="'badge-' + ${tarea.estado}" th:text="${tarea.estado}">Estado</span>
                                    </td>
                                    <td class="align-middle">
                                        <span class="badge" th:classappend="'badge-' + ${tarea.prioridad}" th:text="${tarea.prioridad}">Prioridad</span>
                                    </td>
                                    <td class="align-middle">
                                        <div class="d-flex align-items-center gap-1">
                                            <i class="bi bi-person-circle text-muted"></i>
                                            <small th:text="${tarea.asignadoA.nombre + ' ' + tarea.asignadoA.apellidos}">Usuario</small>
                                        </div>
                                        <small class="badge bg-light text-dark border" th:text="${tarea.asignadoA.rol}">Rol</small>
                                    </td>
                                    <td class="align-middle">
                                        <form th:action="@{/supervisor/reasignar-tarea/{id}(id=${tarea.id})}" method="post"
                                              class="d-flex gap-1">
                                            <select name="nuevoUsuarioId" class="form-select form-select-sm">
                                                <option th:each="u : ${usuarios}"
                                                        th:value="${u.id}"
                                                        th:text="${u.nombre + ' (' + u.rol + ')' }"
                                                        th:selected="${u.id == tarea.asignadoA.id}">Usuario</option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-outline-primary" title="Reasignar">
                                                <i class="bi bi-arrow-right"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
