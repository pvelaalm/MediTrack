<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Usuarios')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar('SUPERVISOR')}"></nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar py-3">
            <div class="position-sticky">
                <ul class="nav flex-column px-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/supervisor/dashboard}">
                            <i class="bi bi-speedometer2 me-2"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/supervisor/carga-trabajo}">
                            <i class="bi bi-bar-chart me-2"></i>Carga de Trabajo
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/supervisor/reasignar-tareas}">
                            <i class="bi bi-arrow-left-right me-2"></i>Reasignar Tareas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-semibold" th:href="@{/supervisor/usuarios}">
                            <i class="bi bi-people-fill me-2"></i>Usuarios
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Contenido principal -->
        <main class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">
                    <i class="bi bi-people-fill me-2" style="color: #6f42c1;"></i>Gestión de Usuarios
                </h2>
                <div class="d-flex align-items-center gap-3">
                    <span class="badge bg-secondary fs-6 px-3 py-2">
                        Total: <span th:text="${#lists.size(usuarios)}">0</span> usuarios
                    </span>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCrear">
                        <i class="bi bi-person-plus-fill me-1"></i>Nuevo Usuario
                    </button>
                </div>
            </div>

            <!-- Alertas -->
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${mensajeError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(usuarios)}" class="text-center py-5 text-muted">
                        <i class="bi bi-people" style="font-size: 3rem;"></i>
                        <h5 class="mt-3">No hay usuarios registrados</h5>
                        <button class="btn btn-primary mt-2" data-bs-toggle="modal" data-bs-target="#modalCrear">
                            <i class="bi bi-person-plus-fill me-1"></i>Crear primer usuario
                        </button>
                    </div>
                    <div th:unless="${#lists.isEmpty(usuarios)}" class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Usuario</th>
                                    <th>Nombre Completo</th>
                                    <th>Rol</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="usuario, iter : ${usuarios}">
                                    <td class="align-middle text-muted" th:text="${iter.count}">1</td>
                                    <td class="align-middle">
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                                 style="width:38px;height:38px;"
                                                 th:style="${usuario.rol.name() == 'ENFERMERIA'} ? 'background:rgba(13,110,253,0.1);' : (${usuario.rol.name() == 'MEDICINA'} ? 'background:rgba(25,135,84,0.1);' : 'background:rgba(111,66,193,0.1);')">
                                                <i class="bi bi-person"
                                                   th:style="${usuario.rol.name() == 'ENFERMERIA'} ? 'color:#0d6efd;' : (${usuario.rol.name() == 'MEDICINA'} ? 'color:#198754;' : 'color:#6f42c1;')"></i>
                                            </div>
                                            <code class="fs-6" th:text="${usuario.username}">username</code>
                                        </div>
                                    </td>
                                    <td class="align-middle fw-semibold"
                                        th:text="${usuario.nombre + ' ' + usuario.apellidos}">Nombre</td>
                                    <td class="align-middle">
                                        <span class="badge fs-6"
                                              th:classappend="${usuario.rol.name() == 'ENFERMERIA'} ? 'bg-primary' : (${usuario.rol.name() == 'MEDICINA'} ? 'bg-success' : '')"
                                              th:style="${usuario.rol.name() == 'SUPERVISOR'} ? 'background-color:#6f42c1;' : ''"
                                              th:text="${usuario.rol}">Rol</span>
                                    </td>
                                    <td class="align-middle text-center">
                                        <button class="btn btn-sm btn-outline-primary me-1"
                                                th:data-id="${usuario.id}"
                                                th:data-nombre="${usuario.nombre}"
                                                th:data-apellidos="${usuario.apellidos}"
                                                th:data-username="${usuario.username}"
                                                th:data-rol="${usuario.rol.name()}"
                                                onclick="abrirModalEditar(this)"
                                                title="Editar">
                                            <i class="bi bi-pencil-fill"></i>
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger"
                                                th:data-id="${usuario.id}"
                                                th:data-nombre="${usuario.nombre + ' ' + usuario.apellidos}"
                                                onclick="abrirModalEliminar(this)"
                                                title="Eliminar">
                                            <i class="bi bi-trash-fill"></i>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Modal Crear Usuario -->
<div class="modal fade" id="modalCrear" tabindex="-1" aria-labelledby="modalCrearLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalCrearLabel">
                    <i class="bi bi-person-plus-fill me-2"></i>Nuevo Usuario
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/supervisor/usuarios/crear}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" class="form-control" name="nombre" required maxlength="100" placeholder="Nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Apellidos</label>
                        <input type="text" class="form-control" name="apellidos" required maxlength="100" placeholder="Apellidos">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control" name="username" required maxlength="50" placeholder="nombre.apellido">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" class="form-control" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Rol</label>
                        <select class="form-select" name="rol" required>
                            <option value="" disabled selected>Seleccionar rol...</option>
                            <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-person-plus-fill me-1"></i>Crear Usuario
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Editar Usuario -->
<div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalEditarLabel">
                    <i class="bi bi-pencil-fill me-2"></i>Editar Usuario
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formEditar" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" class="form-control" id="editNombre" name="nombre" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Apellidos</label>
                        <input type="text" class="form-control" id="editApellidos" name="apellidos" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control" id="editUsername" name="username" required maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nueva Contraseña <span class="text-muted fw-normal">(dejar en blanco para no cambiar)</span></label>
                        <input type="password" class="form-control" name="password" minlength="6" placeholder="Nueva contraseña (opcional)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Rol</label>
                        <select class="form-select" id="editRol" name="rol" required>
                            <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Confirmar Eliminación -->
<div class="modal fade" id="modalEliminar" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="modalEliminarLabel">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-1">¿Eliminar al usuario:</p>
                <strong id="eliminarNombre" class="text-danger"></strong>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <form id="formEliminar" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash-fill me-1"></i>Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    function abrirModalEditar(btn) {
        const id = btn.getAttribute('data-id');
        document.getElementById('editNombre').value = btn.getAttribute('data-nombre');
        document.getElementById('editApellidos').value = btn.getAttribute('data-apellidos');
        document.getElementById('editUsername').value = btn.getAttribute('data-username');
        document.getElementById('editRol').value = btn.getAttribute('data-rol');
        document.getElementById('formEditar').action = '/supervisor/usuarios/editar/' + id;
        new bootstrap.Modal(document.getElementById('modalEditar')).show();
    }

    function abrirModalEliminar(btn) {
        const id = btn.getAttribute('data-id');
        const nombre = btn.getAttribute('data-nombre');
        document.getElementById('eliminarNombre').textContent = nombre;
        document.getElementById('formEliminar').action = '/supervisor/usuarios/eliminar/' + id;
        new bootstrap.Modal(document.getElementById('modalEliminar')).show();
    }
</script>
</body>
</html>
